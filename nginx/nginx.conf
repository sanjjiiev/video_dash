# ==============================================================================
# nginx/nginx.conf  —  Main Nginx config
# ==============================================================================

user  nginx;
worker_processes auto;   # one worker per CPU core

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;  # max simultaneous connections per worker
    use epoll;                 # Linux-optimized I/O event model
    multi_accept on;           # accept as many new connections as possible
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging format ──────────────────────────────────────────────────────
    log_format main_json escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_time":"$upstream_response_time",'
            '"upstream_cache_status":"$upstream_cache_status",'
            '"http_referer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"request_id":"$request_id"'
        '}';

    access_log  /var/log/nginx/access.log  main_json;

    # ── Performance ─────────────────────────────────────────────────────────
    sendfile           on;    # kernel-level file transfer (bypass user space)
    tcp_nopush         on;    # batch send headers + first data packet
    tcp_nodelay        on;    # disable Nagle for low-latency streaming
    keepalive_timeout  65s;
    keepalive_requests 1000;  # reuse connections for up to 1000 requests

    # ── Request ID ──────────────────────────────────────────────────────────
    # Generate a unique ID for every request for log correlation
    add_header X-Request-ID $request_id always;

    # ── Proxy cache for HLS segments ────────────────────────────────────────
    # levels=1:2  : 2-level directory structure (prevents too many files per dir)
    # keys_zone   : 100MB shared memory for cache keys (each key ~200 bytes)
    #               100MB ≈ 500,000 cached keys
    # max_size    : 10GB max disk usage for cached .ts segments
    # inactive    : evict entries not accessed within 24 hours
    proxy_cache_path /var/cache/nginx/hls
        levels=1:2
        keys_zone=hls_segments:100m
        max_size=10g
        inactive=24h
        use_temp_path=off;

    # ── Limits ──────────────────────────────────────────────────────────────
    client_header_timeout  15s;
    client_body_timeout    300s;

    # Conceal Nginx version in server header and error pages
    server_tokens off;

    # ── Server blocks ────────────────────────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
