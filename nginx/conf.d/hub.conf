# ==============================================================================
# nginx/conf.d/hub.conf
#
# Production-grade Nginx configuration for HUB 2.0.
#
# Responsibilities:
#   1. HTTPS termination (TLS cert paths configured via env in production)
#   2. Reverse proxy to the Express API
#   3. HLS segment caching (Nginx proxy_cache for immutable .ts files)
#   4. auth_request validation before serving HLS content
#   5. Rate limiting at the Nginx layer (in addition to Express rate limits)
#   6. Security headers and protections
# ==============================================================================

# ── Rate limiting zones ────────────────────────────────────────────────────────
# Shared memory zone: 10MB stores ~160,000 IP states
limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m   rate=5r/m;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=hls_limit:10m    rate=100r/s;

# ── Upstream definitions ────────────────────────────────────────────────────────
upstream api_backend {
    server api:3000;
    keepalive 32;    # persistent connections to the API (fewer TCP handshakes)
}

# ── HTTP → HTTPS redirect (production) ─────────────────────────────────────────
# In development (no TLS), this block is removed or commented out.
# server {
#     listen 80;
#     server_name yourdomain.com;
#     return 301 https://$host$request_uri;
# }

# ── Main server block ───────────────────────────────────────────────────────────
server {
    # In development, listen on HTTP 80.
    # In production, switch to: listen 443 ssl http2;
    listen 80;
    server_name localhost;

    # ── TLS (uncomment in production) ──
    # ssl_certificate     /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    # ssl_prefer_server_ciphers off;
    # ssl_session_cache   shared:SSL:10m;
    # ssl_session_timeout 1d;
    # ssl_stapling on;
    # ssl_stapling_verify on;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Content-Type-Options   "nosniff"           always;
    add_header X-Frame-Options          "SAMEORIGIN"        always;
    add_header X-XSS-Protection         "1; mode=block"     always;
    add_header Referrer-Policy          "strict-origin"     always;
    # HSTS (uncomment in production with TLS)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── General proxy settings ─────────────────────────────────────────────
    proxy_http_version     1.1;
    proxy_set_header       Connection "";         # enables keepalive to upstream
    proxy_set_header       Host              $host;
    proxy_set_header       X-Real-IP         $remote_addr;
    proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header       X-Forwarded-Proto $scheme;
    proxy_set_header       X-Request-ID      $request_id;
    proxy_read_timeout     300s;   # allow long-poll / large uploads
    proxy_send_timeout     300s;
    proxy_connect_timeout  10s;

    # ── Client upload settings (for streaming MP4 uploads) ─────────────────
    client_max_body_size    600m;   # must be ≥ MAX_UPLOAD_BYTES in the API
    client_body_timeout     300s;

    # ── Gzip ───────────────────────────────────────────────────────────────
    gzip                on;
    gzip_vary           on;
    gzip_proxied        any;
    gzip_comp_level     6;
    gzip_min_length     1024;
    gzip_types          text/plain text/css application/json application/javascript
                        application/vnd.apple.mpegurl;   # compress .m3u8 playlists

    # ── Health check (internal LB probe, no rate limit) ────────────────────
    location = /health {
        proxy_pass http://api_backend;
        access_log off;
    }

    # ── Auth endpoints (strict rate limit) ─────────────────────────────────
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://api_backend;
    }

    # ── Upload endpoint (separate rate limit + larger body) ─────────────────
    location /api/v1/videos/upload {
        limit_req zone=upload_limit burst=5 nodelay;
        proxy_pass http://api_backend;
        # Disable Nginx buffering for streaming upload — pass directly to Express
        proxy_request_buffering off;
    }

    # ── General API ─────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://api_backend;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # HLS Delivery — the high-traffic path
    # ─────────────────────────────────────────────────────────────────────────

    # Internal location: Nginx auth_request subrequest target.
    # Never accessible directly from outside; only called internally by Nginx.
    location = /_hls_auth {
        internal;
        proxy_pass              http://api_backend/api/v1/internal/hls-auth;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length   "";
        proxy_set_header        X-Original-URI   $request_uri;
        proxy_set_header        Cookie           $http_cookie;
        proxy_set_header        Authorization    $http_authorization;
        # Cache auth results briefly to reduce load — 30s is safe for JWT access tokens
        proxy_cache_valid       200 30s;
    }

    # .ts segment files — immutable content, cache aggressively for 24 h
    location ~ ^/hls/.+\.ts$ {
        limit_req zone=hls_limit burst=200 nodelay;

        # Validate session before serving the segment
        auth_request /_hls_auth;
        error_page 401 = @hls_unauthorized;
        error_page 403 = @hls_unauthorized;

        proxy_pass        http://api_backend;

        # Nginx caches the proxied response
        proxy_cache       hls_segments;
        proxy_cache_key   "$uri";            # Cache by URI only (not query params)
        proxy_cache_valid 200 24h;           # .ts files are immutable
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating; # serve stale while fetching

        add_header X-Cache-Status $upstream_cache_status always;
        add_header Cache-Control  "public, max-age=86400, immutable" always;
    }

    # .m3u8 playlist files — short cache for VOD (playlists don't change)
    location ~ ^/hls/.+\.m3u8$ {
        limit_req zone=hls_limit burst=100 nodelay;

        auth_request /_hls_auth;
        error_page 401 = @hls_unauthorized;
        error_page 403 = @hls_unauthorized;

        proxy_pass        http://api_backend;

        proxy_cache       hls_segments;
        proxy_cache_key   "$uri";
        proxy_cache_valid 200 60s;          # .m3u8 files are stable for VOD
        proxy_cache_valid 404 30s;

        add_header X-Cache-Status $upstream_cache_status always;
        add_header Cache-Control  "public, max-age=60" always;
    }

    # Catch-all for /hls/ (e.g. .key files — these must NOT be cached)
    location /hls/ {
        limit_req zone=hls_limit burst=50 nodelay;

        auth_request /_hls_auth;
        error_page 401 = @hls_unauthorized;

        proxy_pass http://api_backend;
        # No caching for .key requests (there should be none — keys go through /api/v1/keys/)
        add_header Cache-Control "no-store, no-cache" always;
    }

    # Named location for unauthorized HLS access
    location @hls_unauthorized {
        return 401 '{"error":"Authentication required"}';
        add_header Content-Type application/json always;
    }

    # ── Default: 404 for unknown paths ──────────────────────────────────────
    location / {
        return 404 '{"error":"Not found"}';
        add_header Content-Type application/json;
    }
}
