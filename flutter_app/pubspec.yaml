name: hub_streaming
description: HUB 2.0 — Production-grade hybrid video streaming platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Video Player (mpv-based, supports HLS/AES-128/local files) ────────────
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.4

  # ── State Management ─────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── Navigation ───────────────────────────────────────────────────────────
  go_router: ^14.2.7

  # ── Networking ────────────────────────────────────────────────────────────
  dio: ^5.4.3+1
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1

  # ── Local Storage ─────────────────────────────────────────────────────────
  shared_preferences: ^2.3.1

  # ── File Picker (local media playback) ────────────────────────────────────
  file_picker: ^8.1.2

  # ── Device Sensors (gyroscope for auto-rotate) ────────────────────────────
  sensors_plus: ^5.0.1

  # ── Images ────────────────────────────────────────────────────────────────
  cached_network_image: ^3.3.1

  # ── UI ────────────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  animations: ^2.0.11
  flutter_animate: ^4.5.0

  # ── Utilities ─────────────────────────────────────────────────────────────
  timeago: ^3.6.1
  equatable: ^2.0.5
  uuid: ^4.4.0
  intl: ^0.19.0
  wakelock_plus: ^1.2.8              # keep screen on during playback
  permission_handler: ^11.3.1
  share_plus: ^10.0.2
  path_provider: ^2.1.3
  connectivity_plus: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
